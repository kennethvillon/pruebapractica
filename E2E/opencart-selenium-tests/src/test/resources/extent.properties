# Reporte HTML
extent.reporter.html.start=true
extent.reporter.html.out=test-output/extent-report.html

# Reporte JSON
extent.reporter.json.start=true
extent.reporter.json.out=test-output/extent-report.json

# Screenshots
screenshot.dir=test-output/screenshots/
screenshot.rel.path=../screenshots/

# ✅ Estas dos líneas hacen que los screenshots se incrusten en el HTML
extent.reporter.html.config.enableScreenshotsInBase64=true
screenshot.encoding=base64

# Titulo del reporte
extent.reporter.html.config.reportName=OpenCart - Reporte de Pruebas
extent.reporter.html.config.documentTitle=OpenCart Test Suite